<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>+1 Cadets</title>

<style>
    body {
        font-family: "Times New Roman", serif;
        text-align: center;
    }

    h1 {
        font-size: 40px;
        margin-top: 20px;
        font-weight: 900;
    }

    .underline-bar {
        width: 260px;
        height: 10px;
        margin: 5px auto 30px;
        display: flex;
    }

    .bar-red { background: red; width: 33%; }
    .bar-navy { background: navy; width: 33%; }
    .bar-sky { background: skyblue; width: 34%; }

    .grid-container {
        width: 90%;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 35px;
    }

    .cadet-box { text-align: center; }

    .photo-frame {
        width: 180px;
        height: 230px;
        margin: auto;
        border: 10px solid skyblue;
        background: white;
        padding: 4px;
        position: relative;
        box-sizing: border-box;
    }

    .photo-frame::before {
        content: "";
        position: absolute;
        inset: 4px;
        border: 6px solid navy;
    }

    .photo-frame::after {
        content: "";
        position: absolute;
        inset: 12px;
        border: 4px solid red;
    }

    .photo-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 10;
        position: relative;
    }

    .labels {
        text-align: left;
        width: 180px;
        margin: 10px auto;
        font-size: 18px;
        font-weight: bold;
        line-height: 1.2em;
    }

    .gradient-button {
        margin: 60px auto;
        display: inline-block;
        padding: 14px 45px;
        font-size: 20px;
        font-weight: bold;
        color: black;
        border-radius: 50px;
        background: white;
        position: relative;
        z-index: 1;
        text-decoration: none;
    }

    .gradient-button::before {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50px;
        background: linear-gradient(90deg, navy, red, skyblue);
        z-index: -1;
    }

    .empty-note{
        font-size: 24px;
        font-weight: bold;
        margin-top: 60px;
    }
</style>
</head>

<body>

<h1>+1 CADETS</h1>

<div class="underline-bar">
    <div class="bar-red"></div>
    <div class="bar-navy"></div>
    <div class="bar-sky"></div>
</div>

<div class="empty-note">No cadets in this section.</div>

<a href="index.html" class="gradient-button">Back to Home</a>

</body>
</html>
